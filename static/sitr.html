<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNXET MART | Premium Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main: #cdef2e; --bg: #f8f8f8; --dark: #111; --gray: #888; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--dark); overflow-x: hidden; }
        
        /* Header & Navigation */
        header { background: #000; color: #fff; padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 1000; }
        .badge { position: absolute; top: -8px; right: -8px; background: var(--main); color: #000; font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
        .icon-btn { position: relative; cursor: pointer; font-size: 18px; }

        /* Sidebar */
        .sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: #fff; z-index: 3000; transition: 0.3s; display: flex; flex-direction: column; }
        .sidebar.open { left: 0; box-shadow: 15px 0 40px rgba(0,0,0,0.1); }
        .menu-item { display: flex; align-items: center; padding: 15px 20px; color: #333; text-decoration: none; gap: 15px; cursor: pointer; transition: 0.2s; }
        .menu-item:hover { background: #f0f0f0; color: #000; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2500; }

        /* Product Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 15px; padding: 20px 5%; }
        .card { background: #fff; border-radius: 20px; overflow: hidden; position: relative; transition: 0.3s; border: 1px solid #eee; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-info { padding: 12px; }
        .fav-btn { position: absolute; top: 10px; right: 10px; background: #fff; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; color: #ccc; }
        .fav-btn.active { color: #ff4747; }

        /* Modals */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 4000; justify-content: center; align-items: center; padding: 10px; box-sizing: border-box; }
        .modal-content { background: #fff; width: 100%; max-width: 400px; border-radius: 30px; padding: 25px; position: relative; max-height: 90vh; overflow-y: auto; }
        .action-btn { background: var(--main); border: none; padding: 15px; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .size-box { border: 1px solid #ddd; padding: 10px; border-radius: 10px; cursor: pointer; text-align: center; flex: 1; transition: 0.2s; }
        .size-box.selected { background: var(--main); border-color: var(--main); font-weight: bold; }

        /* Animations */
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }
        .bonus-anim { position: absolute; color: #4CAF50; font-weight: bold; pointer-events: none; animation: floatUp 0.8s forwards; z-index: 5000; }

        /* Game area */
        #game-canvas { width: 100%; height: 250px; background: #000; border-radius: 20px; position: relative; overflow: hidden; }
        .item-drop { position: absolute; font-size: 24px; cursor: pointer; }

        /* Inputs */
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
    <div style="padding:30px 20px; border-bottom:1px solid #eee;">
        <h2 style="margin:0;">LUNXET</h2>
    </div>
    <div class="menu-item" onclick="location.reload()"><i class="fas fa-home"></i> Головна</div>
    <div class="menu-item" onclick="window.location.href='/ai-helper'"><i class="fas fa-magic"></i> AI Стиліст</div>
    <div class="menu-item" onclick="openGame()"><i class="fas fa-coins"></i> Бонусна гра</div>
    <div class="menu-item" onclick="openSection('favs')"><i class="fas fa-heart"></i> Обране</div>
    <div class="menu-item" onclick="openProfile()"><i class="fas fa-user"></i> Мій кабінет</div>
</div>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <i class="fas fa-bars" onclick="openMenu()" style="cursor:pointer;"></i>
        <span style="font-weight:900; letter-spacing:1px;">LUNXET</span>
    </div>
    <div style="display:flex; gap:20px;">
        <div class="icon-btn" onclick="openSection('cart')"><i class="fas fa-shopping-bag"></i><span id="cart-count" class="badge">0</span></div>
        <div class="icon-btn" onclick="openProfile()"><i class="far fa-user"></i></div>
    </div>
</header>

<div style="padding: 15px 5% 0;">
    <input type="text" id="search-in" placeholder="Пошук кросівок, худі..." oninput="handleSearch()">
</div>

<div class="grid" id="main-grid"></div>

<div id="modal" class="modal" onclick="if(event.target==this)closeM()">
    <div class="modal-content" id="modal-content"></div>
</div>

<script>
    const api = window.location.origin + "/api";
    let products = [], cart = JSON.parse(localStorage.getItem('cart')) || [], favs = JSON.parse(localStorage.getItem('favs')) || [];
    let currentProduct = null, selectedSize = null;

    // Завантаження товарів
    async function init() {
        try {
            const res = await fetch(`${api}/products`);
            products = await res.json();
            render(products);
            updateUI();
        } catch(e) {
            // Демо-дані якщо API не доступне
            products = [
                {name: "Nike Air Max LUNX", price: 4500, cat: "Взуття", images: ["https://images.unsplash.com/photo-1542291026-7eec264c27ff"], sizes: ["40","41","42"]},
                {name: "Black Oversize Hoodie", price: 2100, cat: "Кофти", images: ["https://images.unsplash.com/photo-1556821840-3a63f95609a7"], sizes: ["S","M","L"]}
            ];
            render(products);
        }
    }

    function render(data) {
        document.getElementById('main-grid').innerHTML = data.map(p => `
            <div class="card" onclick="viewProduct('${p.name}')">
                <button class="fav-btn ${favs.some(f=>f.name===p.name)?'active':''}" onclick="event.stopPropagation(); toggleFav('${p.name}')">
                    <i class="fas fa-heart"></i>
                </button>
                <img src="${p.images[0]}">
                <div class="card-info">
                    <div style="font-size:13px; font-weight:600;">${p.name}</div>
                    <div style="color:var(--gray); margin-top:5px;">${p.price} ₴</div>
                </div>
            </div>
        `).join('');
    }

    function viewProduct(name) {
        currentProduct = products.find(p => p.name === name);
        selectedSize = null;
        const cont = document.getElementById('modal-content');
        cont.innerHTML = `
            <img src="${currentProduct.images[0]}" style="width:100%; border-radius:20px; height:250px; object-fit:cover;">
            <h2>${currentProduct.name}</h2>
            <p style="font-size:20px; font-weight:bold;">${currentProduct.price} ₴</p>
            <div style="display:flex; gap:10px; margin:15px 0;" id="size-list">
                ${currentProduct.sizes.map(s => `<div class="size-box" onclick="selectSize('${s}', this)">${s}</div>`).join('')}
            </div>
            <button class="action-btn" onclick="addToCart()">ДОДАТИ В КОШИК</button>
        `;
        openM();
    }

    function selectSize(size, el) {
        selectedSize = size;
        document.querySelectorAll('.size-box').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
    }

    function addToCart() {
        if(!localStorage.getItem('user')) {
            showNotify("Спершу увійдіть в акаунт!", "error");
            openProfile();
            return;
        }
        if(!selectedSize) {
            showNotify("Будь ласка, оберіть розмір!", "error");
            return;
        }
        cart.push({...currentProduct, size: selectedSize, id: Date.now()});
        localStorage.setItem('cart', JSON.stringify(cart));
        updateUI();
        closeM();
        showNotify("Товар додано!");
    }

    // ОФОРМЛЕННЯ ЗАМОВЛЕННЯ
    function openCheckout() {
        const cont = document.getElementById('modal-content');
        const total = cart.reduce((sum, i) => sum + i.price, 0);
        cont.innerHTML = `
            <h2>Оформлення</h2>
            <div style="margin-bottom:20px;">Сума до сплати: <b>${total} ₴</b></div>
            <input type="text" placeholder="Прізвище та Ім'я">
            <input type="text" placeholder="Місто та відділення пошти">
            <select id="pay-method">
                <option value="card">Оплата картою</option>
                <option value="cash">При отриманні</option>
                <option value="bonus">Бонусами LUNXET</option>
            </select>
            <button class="action-btn" onclick="confirmOrder()">ПІДТВЕРДИТИ ЗАМОВЛЕННЯ</button>
        `;
    }

    function confirmOrder() {
        showNotify("Замовлення №"+Math.floor(Math.random()*9000)+" прийнято!");
        cart = [];
        localStorage.setItem('cart', '[]');
        updateUI();
        closeM();
    }

    // АНІМАЦІЯ БОНУСІВ ТА ГРА
    function openGame() {
        if(!localStorage.getItem('user')) { showNotify("Увійдіть для гри!", "error"); return; }
        const cont = document.getElementById('modal-content');
        cont.innerHTML = `
            <h2>LUNXET BONUS</h2>
            <div id="game-canvas"></div>
            <p>Збирайте значки 💎, уникайте ❌</p>
            <button class="action-btn" onclick="closeM()">ЗАВЕРШИТИ</button>
        `;
        openM();
        startBonusGame();
    }

    function startBonusGame() {
        const canvas = document.getElementById('game-canvas');
        const loop = setInterval(() => {
            if(document.getElementById('game-canvas') === null) { clearInterval(loop); return; }
            const item = document.createElement('div');
            const isGood = Math.random() > 0.3;
            item.className = 'item-drop';
            item.innerHTML = isGood ? '💎' : '❌';
            item.style.left = Math.random() * 90 + '%';
            item.style.top = '-30px';
            
            item.onclick = (e) => {
                if(isGood) {
                    spawnBonusAnim(e.clientX, e.clientY, "+0.50");
                    addMoney(0.50);
                } else {
                    spawnBonusAnim(e.clientX, e.clientY, "-1.00", "red");
                    addMoney(-1.00);
                }
                item.remove();
            };
            canvas.appendChild(item);
            
            let pos = -30;
            const fall = setInterval(() => {
                pos += 2;
                item.style.top = pos + 'px';
                if(pos > 250) { clearInterval(fall); item.remove(); }
            }, 20);
        }, 800);
    }

    function spawnBonusAnim(x, y, text, color = "#4CAF50") {
        const el = document.createElement('div');
        el.className = 'bonus-anim';
        el.innerText = text;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.color = color;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    function addMoney(val) {
        let cur = parseFloat(localStorage.getItem('user_bonuses')) || 0;
        localStorage.setItem('user_bonuses', Math.max(0, cur + val).toFixed(2));
    }

    // АВТОРИЗАЦІЯ
    function openProfile() {
        const user = localStorage.getItem('user');
        const cont = document.getElementById('modal-content');
        if(user) {
            const b = localStorage.getItem('user_bonuses') || "0.00";
            cont.innerHTML = `
                <div style="text-align:center;">
                    <div style="font-size:40px; margin-bottom:10px;">👋</div>
                    <h3>${user}</h3>
                    <div style="background:#f0f0f0; padding:15px; border-radius:15px;">Бонусний баланс: <b>${b} ₴</b></div>
                    <button class="action-btn" style="background:#ff4747; color:#fff; margin-top:20px;" onclick="logout()">ВИЙТИ</button>
                </div>
            `;
        } else {
            cont.innerHTML = `
                <h2>Вхід</h2>
                <p>Введіть E-mail або телефон:</p>
                <input type="text" id="auth-val" placeholder="example@gmail.com">
                <button class="action-btn" onclick="sendCode()">ОТРИМАТИ КОД</button>
            `;
        }
        openM();
    }

    function sendCode() {
        const val = document.getElementById('auth-val').value;
        if(val.length < 5) return showNotify("Невірні дані", "error");
        
        const cont = document.getElementById('modal-content');
        cont.innerHTML = `
            <h2>Підтвердження</h2>
            <p>Код відправлено на <b>${val}</b>. Перевірте Telegram бота або пошту.</p>
            <input type="number" id="code-val" placeholder="0 0 0 0" style="text-align:center; letter-spacing:5px;">
            <button class="action-btn" onclick="finishAuth('${val}')">УВІЙТИ</button>
        `;
    }

    function finishAuth(user) {
        localStorage.setItem('user', user);
        location.reload();
    }

    function logout() { localStorage.clear(); location.reload(); }

    // ТЕХНІЧНІ ФУНКЦІЇ
    function openSection(type) {
        const cont = document.getElementById('modal-content');
        if(type === 'cart') {
            cont.innerHTML = `<h2>Кошик</h2>` + (cart.length ? cart.map(i => `
                <div style="display:flex; gap:10px; border-bottom:1px solid #eee; padding:10px 0;">
                    <img src="${i.images[0]}" style="width:50px; height:50px; border-radius:8px;">
                    <div style="flex:1"><b>${i.name}</b><br><small>Розмір: ${i.size}</small></div>
                    <b>${i.price} ₴</b>
                </div>
            `).join('') + `<button class="action-btn" onclick="openCheckout()">ОФОРМИТИ ЗАМОВЛЕННЯ</button>` : "Ваш кошик порожній");
        } else if(type === 'favs') {
            cont.innerHTML = `<h2>Обране</h2>` + (favs.length ? favs.map(i => `<p>${i.name} - ${i.price} ₴</p>`).join('') : "Порожньо");
        }
        openM();
    }

    function showNotify(text, type = "success") {
        const n = document.createElement('div');
        n.style = `position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:${type==='success'?'#000':'#ff4747'}; color:#fff; padding:12px 25px; border-radius:30px; z-index:9999; font-size:14px; box-shadow:0 10px 20px rgba(0,0,0,0.2); transition: 0.3s;`;
        n.innerText = text;
        document.body.appendChild(n);
        setTimeout(() => { n.style.opacity = '0'; setTimeout(() => n.remove(), 300); }, 2000);
    }

    function handleSearch() {
        const q = document.getElementById('search-in').value.toLowerCase();
        render(products.filter(p => p.name.toLowerCase().includes(q)));
    }

    function updateUI() { document.getElementById('cart-count').innerText = cart.length; }
    function openM() { document.getElementById('modal').style.display = 'flex'; }
    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function openMenu() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').style.display='block'; }
    function closeMenu() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').style.display='none'; }

    init();
</script>

</body>
</html>
